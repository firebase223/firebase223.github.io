        const encoder = new TextEncoder();
        const decoder = new TextDecoder();

        async function decryptData(secret, salt, iv, encryptedData, aad) {
            const key = await pbkdf2(secret, salt, "SHA-256", 600000, 32);            
            const cryptoKey = await window.crypto.subtle.importKey("raw", key.buffer, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
            const decryptedData = await window.crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: iv,
                    additionalData: aad
                },
                cryptoKey,
                encryptedData.buffer
            );

            return decryptedData;
        }

        async function pbkdf2(secret, salt, hash, iterations, len) {
            const cryptoKey = await window.crypto.subtle.importKey("raw", secret.buffer, { name: "PBKDF2" }, false, ["deriveKey", "deriveBits"]);
            const dk = await window.crypto.subtle.deriveBits(
                {
                    name: "PBKDF2",
                    hash: hash,
                    salt: salt,
                    iterations: iterations
                },
                cryptoKey,
                len * 8// Bytes to bits
            );  

            return new Uint8Array(dk);
        }

            }
        };
        const patternTypeNames = ["Closest Played Digit", "Low Med High", "New Number", "Odd Even", "Sequential", "Sum Range", "Smallest Number Gap", "Largest Number Gap", "All Gaps"];

                    return 'green';
                case 'Odd Even':

                case 'Sequential':

                return (
                    <React.Fragment>
                        {Object.entries(patternMap || {}).map(([gsId, patternTypeMap]) => {

                                    }

                const [list, setList] = React.useState(listProp);

                const onPrevOrNext = (prevOrNext) => () => {
                    const offset = (prevOrNext && prevOrNext.toLowerCase() === "prev" ? -1 : 1) * (invert ? -1 : 1);
                    const newDateIdx = listIdx + offset;
                    setListIdx(newDateIdx);
                };

                const onPickerSelect = (selectedValue) => {
                    const newDateIdx = list.findIndex(x => x === selectedValue);
                    setListIdx(newDateIdx);
                }

                const getItemCounter = () => {
                    if (invert) {
                        return list.length - listIdx;    
                    } else {
                        return listIdx + 1;
                    }
                };

                const showNextPrev = (prevOrNext) => {
                    const checkUpperBound = listIdx + 1 < list.length;
                    const checkLowerBound = listIdx - 1 > -1;
                    if (invert) {
                        return prevOrNext && prevOrNext.toLowerCase() === "prev" ? checkUpperBound : checkLowerBound;
                    } else {
                        return prevOrNext && prevOrNext.toLowerCase() === "prev" ? checkLowerBound : checkUpperBound;
                    }
                };

                    setListIdx(startAtBeginningOfList ? 0 : listProp && listProp.length ? listProp.length - 1 : 0);

                return (haveAllData() ?

                                                                const patTypeNoSpace = staticDataPkg.all_game_settings[gs_id].name.replaceAll(' ', '') + patType.replaceAll(' ', '');

                                                                            </div>
                                                                            <div className="col-9">

                                                                            </div>

                                                                            </div>

                                                                                    <div className="col-1">
                                                                                        <input className="form-check-input" type="checkbox" id={ckboxAllId} checked={selectedPatternMap.has(ckboxAllId)} onChange={(e) => updateSelectedPatternMap("A", ckboxAllId, gs_id, patType, patValue, e)} />                                                                                        
                                                                                    </div>
                                                                                    <div className="col-9" title={`${patValue.count}`}>
                                                                                        <label className="form-check-label">
                                                                                            {patValue.pattern}

                                                                                    </div>
                                                                                    <div className="col-1"  title={`${patValue.count}`}>

                                                                                            {patValue.percent}
                                                                                        </label>                                                                                  
                                                                                    </div>                                                                                    
                                                                                </div>

                                                                        })}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                )

                                        </div>                                       
                                    </div>

                                        <button type="button" className="btn btn-danger" data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="modal" id="wlnsByPatterns">

: ""

                const reset = () => {                    
                    setGameData(gameDataProp);
                    setShowAll(true);

                            </div>    
                        ) : <div className="card">
                                <div className="card-header" style={{backgroundColor: '#0096c2'}}>
                                    {`Pattern Tracker (0/${list.length})`}
                                </div>
                                <div className="card-body">                                
                                </div>
                            </div>}
                    </div>
                );
            }

            const App = ({ }) => {
                const [gameData, setGameData] = React.useState(API.game_data("RollingCash5", false));
                
                const handleGameChange = (e) => {
                    setGameData(API.game_data(e.target.value, false));
                };
            
                return (<div id="app">                    
                    <select className="form-select" aria-label="Game" onChange={handleGameChange} value={gameData.game}>
                        {staticDataPkg && staticDataPkg.games.map(x => <option key={x}>{x}</option>)}
                    </select>
                    <ul className="nav nav-tabs" id="myTab" role="tablist">
                        <li className="nav-item" role="presentation">
                            <button className="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
                                role="tab" aria-controls="home" aria-selected="true">Winning Lottery Numbers</button>
                        </li>
                        <li className="nav-item" role="presentation">
                            <button className="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button"
                                role="tab" aria-controls="profile" aria-selected="false">Generate Lottery Numbers</button>
                        </li>
                    </ul>
                    <div className="tab-content" id="myTabContent">
                        <div className="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
                            <WLNTab gameDataProp={gameData} />
                        </div>
                        <div className="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                            <GenLNTab gameDataProp={gameData} />
                        </div>
                    </div>
                    <div style={{fontSize: "0.5em"}}>timestamp:2025-08-25T09-27-40<br />app sec:1030<br />app min:17<br />build sec:26.869<br />local:true</div>
                    <div className="modal" id="patternTrackerModal">
                        <div className="modal-dialog modal-dialog-scrollable">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h4 className="modal-title">Pattern Tracker Data</h4>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div className="modal-body">
                                    <ul className="nav nav-tabs" id="pattern-tracker-tab" role="tablist">
                                        {Object.entries(wln_pt_pkg.pattern_tracker[gameData.game].ls_groups).map(([k, v]) => {
                                            return (
                                                <li className="nav-item" role="presentation">
                                                    <button className="nav-link" id={`pt-${k}-tab`} data-bs-toggle="tab" data-bs-target={`#pt-${k}-tab-content`} type="button" role="tab" aria-controls={`#pt-${k}-tab-content`} aria-selected="false">{staticDataPkg.all_game_settings[k].name}</button>
                                                </li>
                                            )
                                        })}
                                    </ul>                                    
                                    <div className="tab-content" id="pattern-tracker-tab-content">
                                        {Object.entries(wln_pt_pkg.pattern_tracker[gameData.game].ls_groups).map(([k, v]) => {
                                            return (
                                                <div className="tab-pane fade" id={`pt-${k}-tab-content`} role="tabpanel" aria-labelledby={`pt-${k}-tab`}>
                                                    <PTCarousel ls_group={v} gameDataProp={gameData} />
                                                </div>
                                            )
                                        })}
                                    </div>                                    
                                </div>

                                <div className="modal-footer">
                                    <div className="row g-3">
                                        <div className="col-6">
                                            Start Index: {wln_pt_pkg.pattern_tracker[gameData.game].start_idx}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            End Index: {wln_pt_pkg.pattern_tracker[gameData.game].end_idx}                                                                              
                                        </div>                                        
                                        <div className="col-6">
                                            Start Date: {wln_pt_pkg.pattern_tracker[gameData.game].start_date}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            End Date: {wln_pt_pkg.pattern_tracker[gameData.game].end_date}                                                                              
                                        </div>
                                        <div className="col-6">
                                            WLNS Count: {wln_pt_pkg.pattern_tracker[gameData.game].wlns_count}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            Percent List: {wln_pt_pkg.pattern_tracker[gameData.game].percent_list.join(', ')}                                                                              
                                        </div>
                                        <div className="col-6">
                                            Thread Count: {wln_pt_pkg.pattern_tracker[gameData.game].thread_count}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            Total Count: {wln_pt_pkg.pattern_tracker[gameData.game].total_count}                                                                              
                                        </div>
                                        <div className="col-10">
                                            Time: {wln_pt_pkg.pattern_tracker[gameData.game].time} seconds                                                                                       
                                        </div>
                                        <div className="col-2">
                                            <button type="button" className="btn btn-danger" data-bs-dismiss="modal">Close</button>                                                                                
                                        </div>                                                                                  
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>);
            };

            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(
                <React.StrictMode>
                    <App />
                </React.StrictMode>
            );
        }
        setTimeout(execute_react_code, 500);
    </script>
</body>
