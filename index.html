        const encoder = new TextEncoder();
        const decoder = new TextDecoder();

        async function decryptData(secret, salt, iv, encryptedData, aad) {
            const key = await pbkdf2(secret, salt, "SHA-256", 600000, 32);            
            const cryptoKey = await window.crypto.subtle.importKey("raw", key.buffer, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
            const decryptedData = await window.crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: iv,
                    additionalData: aad
                },
                cryptoKey,
                encryptedData.buffer
            );

            return decryptedData;
        }

        async function pbkdf2(secret, salt, hash, iterations, len) {
            const cryptoKey = await window.crypto.subtle.importKey("raw", secret.buffer, { name: "PBKDF2" }, false, ["deriveKey", "deriveBits"]);
            const dk = await window.crypto.subtle.deriveBits(
                {
                    name: "PBKDF2",
                    hash: hash,
                    salt: salt,
                    iterations: iterations
                },
                cryptoKey,
                len * 8// Bytes to bits
            );  

            return new Uint8Array(dk);
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const API = {
            dates_with_patterns_wasm: (game, patternMap, match_all) => JSON.parse(wasm_bindgen.dates_with_patterns_wasm(game, JSON.stringify(patternMap), match_all)), 
            game_data: (game, asc) => JSON.parse(wasm_bindgen.game_data_wasm(game, asc)),
            static_data: () => JSON.parse(wasm_bindgen.static_data_wasm()),
            wln: (game, date) => JSON.parse(wasm_bindgen.wln_wasm(game, date)),
            stats_quick: (game, start_date, end_date, percent_kvps, date) => JSON.parse(wasm_bindgen.stats_quick_wasm(JSON.stringify([{game, wln_date_range: {start_date, end_date}, percent_kvps, date}]))),
            generate_number: (data, exclude_patterns, include_patterns) => {
                console.log(JSON.stringify({mainBody:data, exclude_patterns, include_patterns}));
                console.log({mainBody:data, exclude_patterns, include_patterns});
                let res = JSON.parse(wasm_bindgen.generate_numbers_wasm(JSON.stringify(data), JSON.stringify(exclude_patterns), JSON.stringify(include_patterns)));
                console.log(res);
                return res;
            }
        };
        const patternTypeNames = ["Closest Played Digit", "Low Med High", "New Number", "Odd Even", "Sequential", "Sum Range", "Smallest Number Gap", "Largest Number Gap", "All Gaps"];
        const getPillColor = (patternType) => {
            switch(patternType) {
                case 'Closest Played Digit':
                    return 'blue';
                case 'Low Med High':
                    return 'DarkRed';
                case 'New Number':
                    return 'green';
                case 'Odd Even':
                    return 'orange';
                case 'Sequential':
                    return 'teal';
                case 'Sum Range':
                    return 'saddlebrown';
                case 'Smallest Number Gap':
                    return 'slategray';
                case 'Largest Number Gap':
                    return 'MediumPurple';
                case 'All Gaps':
                    return 'DarkSlateGrey';                
                default:
                    return 'seagreen';
            } 
        };

        const execute_react_code = () => {
            wasm_bindgen.init_panic_hook();
            wasm_bindgen.load_numbers(JSON.stringify(wln_pt_pkg.wlns));            
            const staticDataPkg = API.static_data();

            const getPatternStr = (patterns) => {
                let map = {};
                Object.entries(patterns).forEach(([gsId, patternMap]) => {
                    let gsName = staticDataPkg.all_game_settings[gsId].name;
                    let pStrList = [];
                    for (const patternType of staticDataPkg.pattern_types) { 
                        if (patternMap[patternType] !== null){                                           
                            const pattern = patternMap[patternType];
                            let str = "";
                            if (Array.isArray(pattern)) {
                                str = pattern.map(x => `${x.pattern} (${x.percent})`).join(", ");
                            } else {
                                str = pattern;
                            }
                            pStrList.push(str); 
                        }
                    }

                    map[gsName] = pStrList.join(" | ");
                });
                return map;
            }

            const getTop50Patterns = (game) =>
                Object.fromEntries(staticDataPkg.game_to_gs_map[game].map(x => [x, staticDataPkg.stats[x]["Top 50% Patterns"]]));

            const getTopPatterns = (game) =>
                Object.fromEntries(staticDataPkg.game_to_gs_map[game].map(x => [x, staticDataPkg.stats[x]["Top Patterns"]]));

                const DDLNumber = ({ value, min, max, onChange, list }) => {
                    const numbers = list ? list : Array.from({ length: max - min + 1 }, (_, i) => i + min);

                const handleChange = (e) => {
                    let v = e.target.value;
                    onChange(!isNaN(v) ? Number(v) : v);
                }
                return (<select value={value} onChange={handleChange}>
                    {numbers.map(x => <option key={x}>{x}</option>)}
                </select>);
            }

            const DDLDates = ({ value, dates, onChange, ...other }) => {
                const handleChange = (e) => {
                    onChange(e.target.value);
                }
                return (<select {...other} value={value} onChange={handleChange}>
                    {dates.map((x, idx) => <option key={idx}>{x}</option>)}
                </select>);
            }

            const PatternView = ({ patternMap }) => {
                return (
                    <React.Fragment>
                        {Object.entries(patternMap || {}).map(([gsId, patternTypeMap]) => {
                            let gsName = staticDataPkg.all_game_settings[gsId].name;
                             return (<React.Fragment key={gsName}>
                                <div style={{ fontWeight: "bold" }}>{gsName}</div>
                                {patternTypeNames.filter(x => patternTypeMap[x]).map(patternTypeName => {                                    
                                    let patternsFinal = patternTypeMap[patternTypeName];
                                    if (!patternsFinal) {
                                        patternsFinal = [];
                                    }
                                    
                                    if (!Array.isArray(patternsFinal)) {
                                        //console.log(patternsFinal);
                                        patternsFinal = [{pattern: patternsFinal, percent: -1000}];
                                    }
                                    return (patternsFinal.map(pattern => <span className={`badge`} style={{marginRight: "2px", backgroundColor: `${getPillColor(patternTypeName)}`}}>{pattern.pattern} {pattern.percent === -1000 ? `` : `(${pattern.percent}%)`}</span>));
                                })}
                            </React.Fragment>);
                        })}
                    </React.Fragment>
                );
            };

            const WLNs = ({ showPicker = true, getHeaderOverwrite, listProp, getWLN, getFooter, startAtBeginningOfList = true, invert = false }) => {
                const [listIdx, setListIdx] = React.useState(startAtBeginningOfList ? 0 : listProp && listProp.length ? listProp.length - 1 : 0);
                const [list, setList] = React.useState(listProp);

                const onPrevOrNext = (prevOrNext) => () => {
                    const offset = (prevOrNext && prevOrNext.toLowerCase() === "prev" ? -1 : 1) * (invert ? -1 : 1);
                    const newDateIdx = listIdx + offset;
                    setListIdx(newDateIdx);
                };

                const onPickerSelect = (selectedValue) => {
                    const newDateIdx = list.findIndex(x => x === selectedValue);
                    setListIdx(newDateIdx);
                }

                const getItemCounter = () => {
                    if (invert) {
                        return list.length - listIdx;    
                    } else {
                        return listIdx + 1;
                    }
                };

                const showNextPrev = (prevOrNext) => {
                    const checkUpperBound = listIdx + 1 < list.length;
                    const checkLowerBound = listIdx - 1 > -1;
                    if (invert) {
                        return prevOrNext && prevOrNext.toLowerCase() === "prev" ? checkUpperBound : checkLowerBound;
                    } else {
                        return prevOrNext && prevOrNext.toLowerCase() === "prev" ? checkLowerBound : checkUpperBound;
                    }
                };

                if (list !== listProp) {
                    setListIdx(startAtBeginningOfList ? 0 : listProp && listProp.length ? listProp.length - 1 : 0);
                    setList(listProp);
                    return;
                }              
                
                const wln = list && list.length ? getWLN(list[listIdx]) : null;

                return (wln ? (
                    <table className="table table-striped table-hover table-bordered">
                        <tbody>
                            <tr>
                                <td>
                                    {showNextPrev("prev") ? <i className="fas fa-chevron-left fa-lg" onClick={onPrevOrNext("prev")}>Previous Date</i> : ""}
                                </td>
                                <td style={{ textAlign: "right" }}>
                                    {showNextPrev("next") ? <i className="fas fa-chevron-right fa-lg" onClick={onPrevOrNext("next")}>Next Date</i> : ""}
                                </td>
                            </tr>
                            <tr>
                                <td colSpan="2" style={{ fontWeight: "bold", textAlign: "center", backgroundColor: "#0096c2" }}>
                                    {showPicker ? <DDLDates dates={list} value={wln.date} onChange={onPickerSelect} /> : ""}
                                    {getHeaderOverwrite ? getHeaderOverwrite(list[listIdx]) : wln.date}
                                </td>
                            </tr>
                            <tr>
                                <td colSpan="2">
                                    <div style={{ fontWeight: "bold" }}>{wln.digits}
                                        <span style={{ fontSize: "x-small", float: "right" }}>{getItemCounter()}/{list.length}</span>
                                    </div>
                                    <PatternView patternMap={wln.patterns} />
                                </td>
                            </tr>
                            {getFooter &&
                                <tr>
                                    <td colSpan="2">
                                        <div>
                                            {getFooter(list[listIdx])}
                                        </div>
                                    </td>
                                </tr>
                            }
                        </tbody>
                    </table>
                ) : <div></div>);
            }

            const WLNTab = ({ gameDataProp }) => {
                const [gameData, setGameData] = React.useState(null);

                const reset = () => {
                    setGameData(gameDataProp);
                }

                if (!gameData || gameDataProp.game !== gameData.game) {
                    reset();
                    return;                
                }

                const dates = gameData ? gameData.dates : [];

                const hasAllData = () => {
                    return gameData ? true : false;
                }

                return (
                    hasAllData() ? <WLNs listProp={dates} getWLN={(date) => API.wln(gameData.game, date)} invert={true} /> : ""
                );
            }

            const GenLNTab = ({ gameDataProp }) => {
                const [gameData, setGameData] = React.useState(null);
                const [glnCount, setGLNCount] = React.useState({});
                const [startDate, setStartDate] = React.useState(null);
                const [endDate, setEndDate] = React.useState(null);
                const [genLNs, setGenLNs] = React.useState(null);
                const [allTopPatterns, setAllTopPatterns] = React.useState(null);
                const [selectedPatternMap, setSelectedPatternMap] = React.useState(new Map());
                const [selectedTopBottomPercent, setSelectedTopBottomPercent] = React.useState("None");

                const percentKeyTemplate = `Bottom %s% Patterns`;

                    const percent_kvps = [["Top 50% Patterns", 50], ["Top Patterns", 0], ["All Patterns", 100], ...topBottomPercentList.map(topBottomPercent => [percentKeyTemplate.replaceAll("%s", topBottomPercent), topBottomPercent * -1])];
                    setAllTopPatterns(gameData.game && startDate && endDate ? API.stats_quick(gameData.game, startDate, endDate, percent_kvps, gameData.max_date_plus_day) : {});
                };                

                const reset = () => {
                    const startDate = gameDataProp.dates[gameDataProp.dates.length - 1];
                    const endDate = gameDataProp.dates[0];
                    setGameData(gameDataProp);
                    setGLNCount({});
                    setStartDate(startDate);
                    setEndDate(endDate);
                    setGenLNs(null);
                    setSelectedTopBottomPercent(30);
                    setSelectedPatternMap(new Map());

                    reloadPatterns(gameDataProp, startDate, endDate);
                };

                const setStartDateHelper = (startDate) => {
                    setStartDate(startDate);
                    reloadPatterns(gameData, startDate, endDate);
                }

                if (!gameData || gameDataProp.game !== gameData.game) {
                    reset();
                    return;
                }

                const haveAllData = () => {
                    return gameData && startDate && endDate;
                };

                const convertToPatternStructure = (list) => {
                    let p = null;

                    if (list?.length) {

                        for (const item of list) { 
                            if (!p[item.ckbox_data.game_setting_id]) {
                                p[item.ckbox_data.game_setting_id] = {};
                            }
                            if (!p[item.ckbox_data.game_setting_id][item.ckbox_data.pattern_type]) {
                                p[item.ckbox_data.game_setting_id][item.ckbox_data.pattern_type] = [];
                            }
                            p[item.ckbox_data.game_setting_id][item.ckbox_data.pattern_type].push({...item.data});
                        }
                    }

                    return p;
                }

                const getWLNPatternDates = (selectedPatterns) => {
                    let dates = [];
                    let patternMap = {};
                    if (selectedPatterns) {
                        for (const [gs, patternTypeMap] of Object.entries(selectedPatterns)) {
                            if (!patternMap[gs]) {
                                patternMap[gs] = [];
                            }
                            for (const [patternType, patterns] of Object.entries(patternTypeMap)) {
                                patternMap[gs].push(...Object.values(patterns).map(x => x.pattern));
                            }
                        }
                    
                        dates = API.dates_with_patterns_wasm(gameData.game, patternMap, false);
                    }
                    
                    return dates;
                };

                const top50Patterns = allTopPatterns ? allTopPatterns["Top 50% Patterns"] : {};
                const topPatterns = allTopPatterns ? allTopPatterns["Top Patterns"] : {};
                const allPatterns = allTopPatterns ? allTopPatterns["All Patterns"] : {};
                const selectedExcludePatterns = selectedTopBottomPercent === "None" ? null : allTopPatterns[percentKeyTemplate.replaceAll("%s", selectedTopBottomPercent)] || null;
                const selectedIncludePatterns = convertToPatternStructure(Array.from(selectedPatternMap.values()).filter(x => x.ckbox_data.type === "A"));
                const selectedPatterns = convertToPatternStructure(Array.from(selectedPatternMap.values()).filter(x => x.ckbox_data.type === "P"));
                const wlnPatternDates = getWLNPatternDates(selectedPatterns);

                const handleGLNCountChange = (keyData) => (key, count) => {
                    setGLNCount({...glnCount, [key]: { count, keyData }});
                };

                const updateSelectedPatternMap = (type, ckboxId, gs_id, patType, patValue, e) => {
                    let newMap = new Map(selectedPatternMap);
                    if (e.target.checked) {
                        newMap.set(ckboxId, { ckbox_data: {"type": type, "game_setting_id":gs_id, "pattern_type": patType }, data: {...patValue}});
                    } else {
                        newMap.delete(ckboxId);
                    }

                    setSelectedPatternMap(newMap);
                }

                const submit = () => {
                    const numberGenDTOs = [];
                    for (const key in glnCount) {
                        if (Object.hasOwnProperty.call(glnCount, key)) {
                            const item = glnCount[key];
                            if (item.count > 0) {
                                if(key === "Auto") {
                                    numberGenDTOs.push({kind: "Auto", game: gameData.game, date: gameData.max_date_plus_day, count: item.count});
                                } else if(key === "Top 50 Patterns" || key === "Top Patterns" || key === "Select Patterns") {
                                    let patterns = {};

                                    if (key === "Top 50 Patterns" || key === "Top Patterns") {
                                        patterns = Object.fromEntries(Object.entries(item.keyData).map(([gs, map]) => [gs, Object.values(map).flatMap(x => x).map(x => x.pattern)]));
                                    } else if (key === "Select Patterns") {
                                        patterns = {};
                                    }

                                    console.log(patterns);
                                    numberGenDTOs.push({kind: "Patterns", game: gameData.game, date: gameData.max_date_plus_day, count: item.count, patterns});
                                } else if(key === "Pattern Tracker") {
                                    numberGenDTOs.push({kind: "PatternTracker", pt_result: item.keyData, game: gameData.game, date: gameData.max_date_plus_day, count: item.count});
                                    //console.log(JSON.stringify(numberGenDTOs));
                                }
                            }
                        }
                    }
                    
                    if (numberGenDTOs.length) {
                        console.log(selectedExcludePatterns);
                        console.log(selectedIncludePatterns);
                        let numberData = API.generate_number(numberGenDTOs, selectedExcludePatterns, selectedIncludePatterns);
                        setGenLNs(numberData);
                    }                
                }

                const getCount = (key) => {
                    return glnCount[key] ? glnCount[key].count ? glnCount[key].count : 0 : 0;
                    //return glnCount[key]?.count ?? 0;
                };

                const setExcludeBottom = (val) => {
                    setSelectedTopBottomPercent(val);
                };

                return (haveAllData() ? 
                    <div>
                        <table className="table table-striped table-hover table-bordered">
                            <tbody>
                                <tr>
                                    <td>
                                        WLN Count For Patterns: <DDLDates dates={gameData.dates} value={startDate} onChange={setStartDateHelper}/> To <DDLDates disabled={true} dates={gameData.dates} value={endDate} onChange={setEndDate}/>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <b>Exclude Bottom:&nbsp;</b><DDLNumber value={selectedTopBottomPercent} list={["None", ...topBottomPercentList]} onChange={setExcludeBottom} />&nbsp;
                                        <button className="btn btn-primary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#divExcludeDetails">
                                            Show Exclude Details
                                        </button>
                                        &nbsp;
                                        <button className="btn btn-primary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#divIncludeDetails">
                                            Show Include Details
                                        </button>
                                        <div>                                                                                     
                                            <div className="collapse" id="divExcludeDetails">
                                                <b>Exclude Pattern Details</b>
                                                <div>
                                                    <PatternView patternMap={selectedExcludePatterns} />
                                                </div>
                                            </div>                                           
                                        </div>
                                        <div>
                                            <div className="collapse" id="divIncludeDetails">
                                                <b>Include Pattern Details</b>
                                                <div>
                                                    <PatternView patternMap={selectedIncludePatterns} />
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <GLNBlock title="Auto" count={getCount("Auto")} onChange={(key, count) => handleGLNCountChange("")(key, count)} />
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <GLNBlock title="Select Patterns" count={getCount("Select Patterns")} onChange={(key, count) => handleGLNCountChange("")(key, count)} body={<button type="button" className="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#allPatternsModal">All Patterns</button>} />
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <GLNBlock title="Top 50 Patterns" count={getCount("Top 50 Patterns")}  onChange={(key, count) => handleGLNCountChange(top50Patterns)(key, count)} body={top50Patterns ? <PatternView patternMap={top50Patterns} /> : ""} />
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <GLNBlock title="Top Patterns" count={getCount("Top Patterns")} onChange={(key, count) => handleGLNCountChange(topPatterns)(key, count)} body={topPatterns ? <PatternView patternMap={topPatterns} /> : ""} />
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <GLNBlock title="Pattern Tracker" count={getCount("Pattern Tracker")} onChange={(key, count) => handleGLNCountChange(wln_pt_pkg.pattern_tracker[gameData.game])(key, count)} body={<button type="button" className="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#patternTrackerModal">Show Pattern Tracker Data</button>} />
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        {(genLNs && genLNs.numbers.length) ? <React.Fragment><WLNs listProp={genLNs.numbers} showPicker={false} getHeaderOverwrite={(genNumber) => `${genNumber.number.date} - ${genNumber.gen_type}`} getWLN={(genNumber) => genNumber.number} getFooter={(genNumber) => genNumber.info} /><br /><br /><br /></React.Fragment> : ""}
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <button className="btn btn-primary btn-sm" onClick={submit}>Generate Numbers</button>
                                    </td>
                                </tr>                            
                            </tbody>
                        </table>
                        <div className="modal" id="allPatternsModal">
                            <div className="modal-dialog modal-dialog-scrollable">
                                <div className="modal-content">
                                    <div className="modal-header">
                                        <h4 className="modal-title">All Patterns</h4>
                                        <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                    </div>

                                    <div className="modal-body" style={{overflowY: "scroll"}}>                                                                              
                                        <ul className="nav nav-tabs" id="all-patterns-tab" role="tablist">
                                            {Object.entries(allPatterns).map(([gs_id, gs_all_patterns]) => {
                                                return (
                                                    <li className="nav-item" role="presentation">
                                                        <button className="nav-link" id={`allp-${gs_id}-tab`} data-bs-toggle="tab" data-bs-target={`#allp-${gs_id}-tab-content`} type="button" role="tab" aria-controls={`#allp-${gs_id}-tab-content`} aria-selected="false">{staticDataPkg.all_game_settings[gs_id].name}</button>
                                                    </li>
                                                )
                                            })}
                                        </ul>                                    
                                        <div className="tab-content" id="all-patterns-tab-content">
                                            {Object.entries(allPatterns).map(([gs_id, gs_all_patterns]) => {
                                                return (
                                                    <div className="tab-pane fade" id={`allp-${gs_id}-tab-content`} role="tabpanel" aria-labelledby={`allp-${gs_id}-tab`}>
                                                        <ul className="nav nav-tabs" id="pattern-tracker-tab" role="tablist">
                                                            {Object.entries(gs_all_patterns).map(([patType, patValues]) => {
                                                                const patTypeNoSpace = staticDataPkg.all_game_settings[gs_id].name.replaceAll(' ', '') + patType.replaceAll(' ', '');
                                                                return (
                                                                    <li className="nav-item" role="presentation">
                                                                        <button className="nav-link" id={`pt-${patTypeNoSpace}-tab`} data-bs-toggle="tab" data-bs-target={`#pt-${patTypeNoSpace}-tab-content`} type="button" role="tab" aria-controls={`#pt-${patTypeNoSpace}-tab-content`} aria-selected="false">{`${patType}-${patValues.map(x => x.count).reduce((sum, v) => sum + v, 0)}`}</button>
                                                                    </li>
                                                                )
                                                            })}
                                                        </ul>                                    
                                                        <div className="tab-content" id="pattern-tracker-tab-content">
                                                            {Object.entries(gs_all_patterns).map(([patType, patValues]) => {
                                                                const patTypeNoSpace = staticDataPkg.all_game_settings[gs_id].name.replaceAll(' ', '') + patType.replaceAll(' ', '');
                                                                return (
                                                                    <div className="tab-pane fade" id={`pt-${patTypeNoSpace}-tab-content`} role="tabpanel" aria-labelledby={`pt-${patTypeNoSpace}-tab`}>
                                                                        <div className="row g-3">
                                                                            <div className="col-1">
                                                                                <b>P</b>                  
                                                                            </div>
                                                                            <div className="col-1">
                                                                                <b>A</b>                                                                                       
                                                                            </div>
                                                                            <div className="col-9">
                                                                                <b>Pattern</b>                                                                                  
                                                                            </div>
                                                                            <div className="col-1">
                                                                                <b>%</b>                                                                                  
                                                                            </div>                                                                                    
                                                                        </div>
                                                                        {patValues.map((patValue, idx) => {
                                                                            let patTypeNoSpaceKey = `${patTypeNoSpace}-${idx}`;
                                                                            let ckboxId = `chkbox-${patTypeNoSpaceKey}`;
                                                                            let ckboxAllId = `chkboxAll-${patTypeNoSpaceKey}`;
                                                                            return (
                                                                                <div className="row g-3">
                                                                                    <div className="col-1">
                                                                                        <input className="form-check-input" type="checkbox" id={ckboxId} checked={selectedPatternMap.has(ckboxId)} onChange={(e) => updateSelectedPatternMap("P", ckboxId, gs_id, patType, patValue, e)} />                                                                                        
                                                                                    </div>
                                                                                    <div className="col-1">
                                                                                        <input className="form-check-input" type="checkbox" id={ckboxAllId} checked={selectedPatternMap.has(ckboxAllId)} onChange={(e) => updateSelectedPatternMap("A", ckboxAllId, gs_id, patType, patValue, e)} />                                                                                        
                                                                                    </div>
                                                                                    <div className="col-9" title={`${patValue.count}`}>
                                                                                        <label className="form-check-label">
                                                                                            {patValue.pattern}
                                                                                        </label>                                                                                  
                                                                                    </div>
                                                                                    <div className="col-1"  title={`${patValue.count}`}>
                                                                                        <label className="form-check-label">
                                                                                            {patValue.percent}
                                                                                        </label>                                                                                  
                                                                                    </div>                                                                                    
                                                                                </div>
                                                                            )
                                                                        })}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>                                       
                                    </div>

                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#wlnsByPatterns">WLNs</button>
                                        <button type="button" className="btn btn-danger" data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="modal" id="wlnsByPatterns">
                            <div className="modal-dialog modal-dialog-scrollable">
                                <div className="modal-content">
                                    <div className="modal-header">
                                        <h4 className="modal-title">WLNs By Patterns</h4>
                                        <button type="button" className="btn-close" data-bs-toggle="modal" data-bs-target="#allPatternsModal"></button>
                                    </div>

                                    <div className="modal-body" style={{overflowY: "scroll"}}>                                        
                                        <WLNs listProp={wlnPatternDates} getWLN={(date) => API.wln(gameData.game, date)} startAtBeginningOfList={false} />                          
                                    </div>

                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-danger" data-bs-toggle="modal" data-bs-target="#allPatternsModal">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
: ""

                );
            }

            const GLNBlock = ({ count, title, onChange, body }) => {
                return (
                    <table>
                        <tbody>
                            <tr>
                                <td style={{ width: "100%", fontSize: "larger", fontWeight: "bold" }}>{title}</td>
                                <td style={{ width: "100%", textAlign: "right" }}><DDLNumber value={count} min={0} max={20} onChange={(val) => onChange(title, val)} /></td>
                            </tr>
                            {body && <tr>
                                <td colSpan="2">
                                    {body}
                                </td>
                            </tr>}
                        </tbody>
                    </table>
                );
            };

            const PTCarousel = ({ ls_group, gameDataProp }) => {
                const [gameData, setGameData] = React.useState(null);
                const [showAll, setShowAll] = React.useState(true);
                
                const reset = () => {                    
                    setGameData(gameDataProp);
                    setShowAll(true);
                };

                if (!gameData || gameDataProp.game !== gameData.game) {
                    reset();
                    return;                
                }

                const list = ls_group.filter(x => showAll || x.item.active);

                return (
                    <div>
                        <div className="form-check form-switch">
                            <input className="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault" checked={showAll} onChange={() => setShowAll(!showAll)} />
                            <label className="form-check-label" htmlFor="flexSwitchCheckDefault">Show All</label>
                        </div>
                        {list && list.length ? list.filter(x => showAll || x.item.active).map((x, idx) => 
                            <div className="card">
                                <div className="card-header" style={{backgroundColor: '#0096c2'}}>
                                    {`Pattern Tracker (${idx + 1}/${list.length})`}
                                </div>
                                <div className="card-body">
                                    {list[idx] ? <pre>{JSON.stringify(list[idx], null, 2)}</pre> : ""}
                                </div>
                            </div>    
                        ) : <div className="card">
                                <div className="card-header" style={{backgroundColor: '#0096c2'}}>
                                    {`Pattern Tracker (0/${list.length})`}
                                </div>
                                <div className="card-body">                                
                                </div>
                            </div>}
                    </div>
                );
            }

            const App = ({ }) => {
                const [gameData, setGameData] = React.useState(API.game_data("RollingCash5", false));
                
                const handleGameChange = (e) => {
                    setGameData(API.game_data(e.target.value, false));
                };
            
                return (<div id="app">                    
                    <select className="form-select" aria-label="Game" onChange={handleGameChange} value={gameData.game}>
                        {staticDataPkg && staticDataPkg.games.map(x => <option key={x}>{x}</option>)}
                    </select>
