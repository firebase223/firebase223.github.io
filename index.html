        const encoder = new TextEncoder();
        const decoder = new TextDecoder();

        async function decryptData(secret, salt, iv, encryptedData, aad) {
            const key = await pbkdf2(secret, salt, "SHA-256", 600000, 32);            
            const cryptoKey = await window.crypto.subtle.importKey("raw", key.buffer, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
            const decryptedData = await window.crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: iv,
                    additionalData: aad
                },
                cryptoKey,
                encryptedData.buffer
            );

            return decryptedData;
        }

        async function pbkdf2(secret, salt, hash, iterations, len) {
            const cryptoKey = await window.crypto.subtle.importKey("raw", secret.buffer, { name: "PBKDF2" }, false, ["deriveKey", "deriveBits"]);
            const dk = await window.crypto.subtle.deriveBits(
                {
                    name: "PBKDF2",
                    hash: hash,
                    salt: salt,
                    iterations: iterations
                },
                cryptoKey,
                len * 8// Bytes to bits
            );  

            return new Uint8Array(dk);
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const API = {
            dates_with_patterns_wasm: (game, patternMap, match_all) => JSON.parse(wasm_bindgen.dates_with_patterns_wasm(game, JSON.stringify(patternMap), match_all)), 
            game_data: (game, asc) => JSON.parse(wasm_bindgen.game_data_wasm(game, asc)),
            static_data: () => JSON.parse(wasm_bindgen.static_data_wasm()),
            wln: (game, date) => JSON.parse(wasm_bindgen.wln_wasm(game, date)),
            stats_quick: (game, start_date, end_date, percent_kvps, date) => JSON.parse(wasm_bindgen.stats_quick_wasm(JSON.stringify([{game, wln_date_range: {start_date, end_date}, percent_kvps, date}]))),
            generate_number: (data, exclude_patterns, include_patterns) => {
                console.log(JSON.stringify({mainBody:data, exclude_patterns, include_patterns}));
                console.log({mainBody:data, exclude_patterns, include_patterns});
                let res = JSON.parse(wasm_bindgen.generate_numbers_wasm(JSON.stringify(data), JSON.stringify(exclude_patterns), JSON.stringify(include_patterns)));
                console.log(res);
                return res;
            }
        };
        const patternTypeNames = ["Closest Played Digit", "Low Med High", "New Number", "Odd Even", "Sequential", "Sum Range", "Smallest Number Gap", "Largest Number Gap", "All Gaps"];
        const getPillColor = (patternType) => {
            switch(patternType) {
                case 'Closest Played Digit':
                    return 'blue';
                case 'Low Med High':
                    return 'DarkRed';
                case 'New Number':
                    return 'green';
                case 'Odd Even':
                    return 'orange';
                case 'Sequential':
                    return 'teal';
                case 'Sum Range':
                    return 'saddlebrown';
                case 'Smallest Number Gap':
                    return 'slategray';
                case 'Largest Number Gap':
                    return 'MediumPurple';
                case 'All Gaps':
                    return 'DarkSlateGrey';                
                default:
                    return 'seagreen';
            } 
        };

        const execute_react_code = () => {
            wasm_bindgen.init_panic_hook();
            wasm_bindgen.load_numbers(JSON.stringify(wln_pt_pkg.wlns));            
            const staticDataPkg = API.static_data();

            const getPatternStr = (patterns) => {
                let map = {};
                Object.entries(patterns).forEach(([gsId, patternMap]) => {
                    let gsName = staticDataPkg.all_game_settings[gsId].name;
                    let pStrList = [];
                    for (const patternType of staticDataPkg.pattern_types) { 
                        if (patternMap[patternType] !== null){                                           
                            const pattern = patternMap[patternType];
                            let str = "";
                            if (Array.isArray(pattern)) {
                                str = pattern.map(x => `${x.pattern} (${x.percent})`).join(", ");
                            } else {
                                str = pattern;
                            }
                            pStrList.push(str); 
                        }
                    }

                    map[gsName] = pStrList.join(" | ");
                });
                return map;
            }

            const getTop50Patterns = (game) =>
                Object.fromEntries(staticDataPkg.game_to_gs_map[game].map(x => [x, staticDataPkg.stats[x]["Top 50% Patterns"]]));

            const getTopPatterns = (game) =>
                Object.fromEntries(staticDataPkg.game_to_gs_map[game].map(x => [x, staticDataPkg.stats[x]["Top Patterns"]]));

                const DDLNumber = ({ value, min, max, onChange, list }) => {
                    const numbers = list ? list : Array.from({ length: max - min + 1 }, (_, i) => i + min);

                const handleChange = (e) => {
                    let v = e.target.value;
                    onChange(!isNaN(v) ? Number(v) : v);
                }
                return (<select value={value} onChange={handleChange}>
                    {numbers.map(x => <option key={x}>{x}</option>)}
                </select>);
            }

            const DDLDates = ({ value, dates, onChange, ...other }) => {
                const handleChange = (e) => {
                    onChange(e.target.value);
                }
                return (<select {...other} value={value} onChange={handleChange}>
                    {dates.map((x, idx) => <option key={idx}>{x}</option>)}
                </select>);
            }

            const PatternView = ({ patternMap }) => {
                return (
                    <React.Fragment>
                        {Object.entries(patternMap || {}).map(([gsId, patternTypeMap]) => {
                            let gsName = staticDataPkg.all_game_settings[gsId].name;
                             return (<React.Fragment key={gsName}>
                                <div style={{ fontWeight: "bold" }}>{gsName}</div>
                                {patternTypeNames.filter(x => patternTypeMap[x]).map(patternTypeName => {                                    
                                    let patternsFinal = patternTypeMap[patternTypeName];
                                    if (!patternsFinal) {
                                        patternsFinal = [];
                                    }
                                    
                                    if (!Array.isArray(patternsFinal)) {
                                        //console.log(patternsFinal);
                                        patternsFinal = [{pattern: patternsFinal, percent: -1000}];
                                    }
                                    return (patternsFinal.map(pattern => <span className={`badge`} style={{marginRight: "2px", backgroundColor: `${getPillColor(patternTypeName)}`}}>{pattern.pattern} {pattern.percent === -1000 ? `` : `(${pattern.percent}%)`}</span>));
                                })}
                            </React.Fragment>);
                        })}
                    </React.Fragment>
                );
            };

            const WLNs = ({ showPicker = true, getHeaderOverwrite, listProp, getWLN, getFooter, startAtBeginningOfList = true, invert = false }) => {
                const [listIdx, setListIdx] = React.useState(startAtBeginningOfList ? 0 : listProp && listProp.length ? listProp.length - 1 : 0);
                const [list, setList] = React.useState(listProp);

                const onPrevOrNext = (prevOrNext) => () => {
                    const offset = (prevOrNext && prevOrNext.toLowerCase() === "prev" ? -1 : 1) * (invert ? -1 : 1);
                    const newDateIdx = listIdx + offset;
                    setListIdx(newDateIdx);
                };

                const onPickerSelect = (selectedValue) => {
                    const newDateIdx = list.findIndex(x => x === selectedValue);
                    setListIdx(newDateIdx);
                }

                const getItemCounter = () => {
                    if (invert) {
                        return list.length - listIdx;    
                    } else {
                        return listIdx + 1;
                    }
                };

                const showNextPrev = (prevOrNext) => {
                    const checkUpperBound = listIdx + 1 < list.length;
                    const checkLowerBound = listIdx - 1 > -1;
                    if (invert) {
                        return prevOrNext && prevOrNext.toLowerCase() === "prev" ? checkUpperBound : checkLowerBound;
                    } else {
                        return prevOrNext && prevOrNext.toLowerCase() === "prev" ? checkLowerBound : checkUpperBound;
                    }
                };

                if (list !== listProp) {
                    setListIdx(startAtBeginningOfList ? 0 : listProp && listProp.length ? listProp.length - 1 : 0);
                    setList(listProp);
                    return;
                }              
                
                const wln = list && list.length ? getWLN(list[listIdx]) : null;

                return (wln ? (
                    <table className="table table-striped table-hover table-bordered">
                        <tbody>
                            <tr>
                                <td>
                                    {showNextPrev("prev") ? <i className="fas fa-chevron-left fa-lg" onClick={onPrevOrNext("prev")}>Previous Date</i> : ""}
                                </td>
                                <td style={{ textAlign: "right" }}>
                                    {showNextPrev("next") ? <i className="fas fa-chevron-right fa-lg" onClick={onPrevOrNext("next")}>Next Date</i> : ""}
                                </td>
                            </tr>
                            <tr>
                                <td colSpan="2" style={{ fontWeight: "bold", textAlign: "center", backgroundColor: "#0096c2" }}>
                                    {showPicker ? <DDLDates dates={list} value={wln.date} onChange={onPickerSelect} /> : ""}
                                    {getHeaderOverwrite ? getHeaderOverwrite(list[listIdx]) : wln.date}
                                </td>
                            </tr>
                            <tr>
                                <td colSpan="2">
                                    <div style={{ fontWeight: "bold" }}>{wln.digits}

                                    //console.log(JSON.stringify(numberGenDTOs));
                                }

                                                            {Object.entries(gs_all_patterns).map(([patType, patValues]) => {
                                                                const patTypeNoSpace = staticDataPkg.all_game_settings[gs_id].name.replaceAll(' ', '') + patType.replaceAll(' ', '');
                                                                return (
                                                                    <div className="tab-pane fade" id={`pt-${patTypeNoSpace}-tab-content`} role="tabpanel" aria-labelledby={`pt-${patTypeNoSpace}-tab`}>

                                                                                <b>P</b>                  
                                                                            </div>

                                                                                <b>A</b>                                                                                       
                                                                            </div>

                                                                                <b>Pattern</b>

                                                                                        <input className="form-check-input" type="checkbox" id={ckboxAllId} checked={selectedPatternMap.has(ckboxAllId)} onChange={(e) => updateSelectedPatternMap("A", ckboxAllId, gs_id, patType, patValue, e)} />                                                                                        
                                                                                    </div>
                                                                                    <div className="col-9" title={`${patValue.count}`}>

                                                                                            {patValue.pattern}

                                                                                    </div>                                                                                    
                                                                                </div>
                                                                            )
                                                                        })}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>                                       
                                    </div>

                                        <button type="button" className="btn btn-danger" data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>

                        </div>

                                        <WLNs listProp={wlnPatternDates} getWLN={(date) => API.wln(gameData.game, date)} startAtBeginningOfList={false} />

: ""
